[project]
name = "rss-hub"
version = "0.1.0"
description = "RSS full-text fetcher and storage"
requires-python = ">=3.12"
dependencies = [
    "feedparser>=6.0.11",
    "trafilatura>=1.6.5",
    "httpx>=0.27.0",
    "pyyaml>=6.0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
